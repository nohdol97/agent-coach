name: ci

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    # Windows·Ubuntu 1급 지원(스펙 R9) — 두 OS에서 실제로 테스트한다. macOS는 병행.
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
      - run: go vet ./...
      - run: go test ./...
      - run: go build ./cmd/agentcoach
